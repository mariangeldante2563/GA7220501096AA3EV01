# ============================================
# Configuracion del servidor
# ============================================
server.port=8080

# ============================================
# Configuracion de MongoDB
# ============================================
# Usa un servidor MongoDB local en el puerto 27017 y la base de datos "registro_clientes".
# Si prefieres otro URI, actualiza esta propiedad.
spring.data.mongodb.uri=mongodb://localhost:27017/registro_clientes

# Mostrar consultas de MongoDB en la consola durante el desarrollo.
spring.data.mongodb.repositories.enabled=true

# Deshabilita la auto-configuracion JPA/Hibernate, ya que esta aplicacion usa MongoDB.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
